name: Keep Streamlit Alive

on:
  schedule:
    # Ping twice daily: 8 AM and 8 PM UTC
    # Streamlit Community Cloud sleeps apps after ~12 hours of inactivity
    - cron: '0 8 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping Streamlit app
        env:
          STREAMLIT_APP_URL: ${{ secrets.STREAMLIT_APP_URL }}
        run: |
          if [ -z "$STREAMLIT_APP_URL" ]; then
            echo "STREAMLIT_APP_URL not set — skipping ping"
            exit 0
          fi
          # Simple HTTP GET is enough to prevent sleep; Streamlit wakes on any request
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$STREAMLIT_APP_URL")
          echo "Streamlit ping status: $STATUS"
